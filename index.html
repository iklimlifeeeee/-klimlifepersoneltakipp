<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İklim Life | Takip Premium v5.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --success: #10b981; --danger: #ef4444; --info: #3b82f6; --bg-gray: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; color: var(--primary); }
        .app-container { width: 100%; max-width: 440px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .nav-header { display: flex; background: var(--primary); padding: 18px; gap: 10px; border-bottom: 3px solid var(--accent); }
        .nav-btn { flex: 1; padding: 12px; border: none; background: rgba(255,255,255,0.05); color: #94a3b8; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: var(--primary); }

        .content { padding: 20px; flex: 1; position: relative; }
        .hidden { display: none !important; }

        .stat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8fafc; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-box b { display: block; font-size: 1.4rem; color: var(--accent); }
        .stat-box span { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 700; }

        .premium-card { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .premium-card small { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; }
        .premium-card h4 { margin: 5px 0; color: var(--accent); }

        .live-status-list { background: #f1f5f9; padding: 12px; border-radius: 15px; margin-bottom: 20px; font-size: 0.8rem; }
        .status-item { display: inline-flex; align-items: center; background: white; padding: 5px 10px; border-radius: 20px; margin: 3px; border: 1px solid #e2e8f0; font-weight: 600; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-work { background: var(--info); box-shadow: 0 0 5px var(--info); }
        .dot-break { background: var(--success); box-shadow: 0 0 5px var(--success); }

        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        .btn-act { padding: 20px 10px; border-radius: 15px; border: none; color: white; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-act:active { transform: scale(0.95); }
        .bg-work { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .bg-break { background: linear-gradient(135deg, #10b981, #059669); }
        .bg-off { background: linear-gradient(135deg, #1e293b, #0f172a); }
        .bg-mola-off { background: linear-gradient(135deg, #f59e0b, #d97706); }

        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; border-radius: 10px; overflow: hidden; }
        th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; text-align: center; background: white; }
        .late { color: var(--danger); font-weight: 800; }
        
        #reader { border-radius: 20px; overflow: hidden; border: 4px solid var(--accent); }
        #done { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); z-index: 99; display: none; background: white; border-radius: 50%; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="done">✅</div>
    
    <div class="nav-header">
        <button id="t-staff" class="nav-btn active" onclick="showView('staff')">PERSONEL</button>
        <button id="t-admin" class="nav-btn" onclick="showView('admin')">YÖNETİCİ</button>
    </div>

    <div class="content">
        <div id="view-login">
            <h2 style="text-align:center">İklim Life Giriş</h2>
            <input type="password" id="pinCode" placeholder="PIN" maxlength="4" style="letter-spacing:15px; font-size:2rem;">
            <button class="btn-act bg-off" onclick="processLogin()">Giriş Yap</button>
        </div>

        <div id="view-panel" class="hidden">
            <div class="premium-card">
                <small>Bugünkü Vardiyanız</small>
                <h4 id="userShift">Yükleniyor...</h4>
                <div id="shiftStatus" style="font-size:0.75rem;">Sabah: 09:30 | Öğle: 13:00</div>
            </div>
            
            <h3 id="userName" style="text-align:center;"></h3>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn-act bg-work" onclick="triggerQR('İşe Giriş')">🚀 İşe Başla</button>
                <button class="btn-act bg-off" onclick="triggerQR('İşten Çıkış')">🏠 Mesai Bitir</button>
                <button class="btn-act bg-break" onclick="triggerQR('Mola Başlat')">☕ Mola Başlat</button>
                <button class="btn-act bg-mola-off" onclick="triggerQR('Mola Bitir')">✅ Mola Bitir</button>
            </div>
            <button style="width:100%; margin-top:30px; border:none; color:#94a3b8; background:none;" onclick="secureLogout()">Güvenli Çıkış</button>
        </div>

        <div id="view-admin" class="hidden">
            <div id="admin-gate">
                <input type="password" id="adminKey" placeholder="Yönetici Şifresi">
                <button class="btn-act bg-off" onclick="unlockAdmin()">Paneli Aç</button>
            </div>
            <div id="admin-data" class="hidden">
                <div class="premium-card" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: var(--primary);">
                    <small>🏆 Haftanın Personeli</small>
                    <h4 id="bestStaff">-</h4>
                    <div style="font-size: 0.7rem; font-weight: 700;">Hatasızlık ve 45dk mola kuralına göre...</div>
                </div>

                <div class="stat-container">
                    <div class="stat-box"><b id="count-work">0</b><span>İçeride</span></div>
                    <div class="stat-box"><b id="count-break">0</b><span>Molada</span></div>
                </div>

                <div id="live-status" class="live-status-list">Anlık Durum: </div>
                
                <h4 style="margin-top:20px;">Personel Durumu</h4>
                <select id="shiftTarget" onchange="loadShiftSetting()" style="display:none;">
                    <option value="">Personel Seçin</option>
                </select>

                <div style="display:flex; gap:10px; margin:20px 0;">
                    <button class="btn-act bg-break" style="padding:12px;" onclick="exportExcel()">Excel Raporu Al</button>
                    <button class="btn-act bg-off" style="padding:12px;" onclick="clearLogs()">Tüm Verileri Sıfırla</button>
                </div>

                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Tarih</th><th>İsim</th><th>Giriş</th><th>Mola</th><th>Bitir</th><th>Çıkış</th></tr></thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-qr" class="hidden">
            <div id="reader"></div>
            <button class="btn-act bg-off" style="margin-top:15px;" onclick="cancelAction()">Vazgeç</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCpgQk-EhcjrsTv685nWM_FlpTFIQBHL5Q",
      authDomain: "iklimlifetakip-c7461.firebaseapp.com",
      projectId: "iklimlifetakip-c7461",
      storageBucket: "iklimlifetakip-c7461.firebasestorage.app",
      messagingSenderId: "657885458698",
      appId: "1:657885458698:web:7fe357879bc2f527c1caf3",
      databaseURL: "https://iklimlifetakip-c7461-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const scanner = new Html5Qrcode("reader");

    const STORE = {
        CODE: "MAGAZA-12345",
        PASS: "1674",
        STAFF: { "0600":"Kübra","6173":"Nefise","7349":"Burcu","9506":"Sultan","4672":"Derya","8672":"Yasemin","1510":"Eda","4209":"Özgün"}
    };

    let currentUser = null;

    function showView(v) {
        ['view-login','view-panel','view-qr','view-admin'].forEach(id => document.getElementById(id).classList.add('hidden'));
        if(v==='staff') {
            if(currentUser) { 
                document.getElementById('view-panel').classList.remove('hidden');
                loadUserShift();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
            }
        } else {
            document.getElementById('view-admin').classList.remove('hidden');
        }
        document.getElementById('t-staff').classList.toggle('active', v==='staff');
        document.getElementById('t-admin').classList.toggle('active', v==='admin');
    }

    function processLogin() {
        const pin = document.getElementById('pinCode').value;
        if(STORE.STAFF[pin]) { 
            currentUser = STORE.STAFF[pin]; 
            document.getElementById('userName').innerText = `Hoş Geldin, ${currentUser}`; 
            showView('staff');
        } else alert("PIN Hatalı!");
    }

    function triggerQR(type) {
        document.getElementById('view-panel').classList.add('hidden');
        document.getElementById('view-qr').classList.remove('hidden');
        scanner.start({facingMode:"environment"}, {fps:15, qrbox:250}, res => {
            if(res === STORE.CODE) {
                scanner.stop().then(() => {
                    const d = new Date();
                    const time = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                    db.ref('logs').push({ 
                        date: d.toLocaleDateString('tr-TR'), 
                        user: currentUser, 
                        type: type, 
                        time: time, 
                        ts: Date.now() 
                    }).then(() => {
                        document.getElementById('done').style.display='block';
                        setTimeout(() => { 
                            document.getElementById('done').style.display='none'; 
                            secureLogout(); 
                        }, 1200);
                    });
                });
            }
        });
    }

    function unlockAdmin() {
        if(document.getElementById('adminKey').value === STORE.PASS) {
            document.getElementById('admin-gate').classList.add('hidden');
            document.getElementById('admin-data').classList.remove('hidden');
            
            db.ref('logs').on('value', snap => {
                const logs = []; 
                snap.forEach(c => { logs.push(c.val()); });
                const report = processReport(logs);
                window.fData = report;
                
                renderAdmin(report);
                calculatePerformance(report);
            });
        }
    }

    function processReport(logs) {
        const daily = {};
        logs.forEach(l => {
            const id = `${l.date}_${l.user}`;
            if(!daily[id]) daily[id] = { Tarih: l.date, İsim: l.user, Giriş: "-", M_Bas: "-", M_Bit: "-", Çıkış: "-" };
            if(l.type === 'İşe Giriş') daily[id].Giriş = l.time;
            if(l.type === 'Mola Başlat') daily[id].M_Bas = l.time;
            if(l.type === 'Mola Bitir') daily[id].M_Bit = l.time;
            if(l.type === 'İşten Çıkış') daily[id].Çıkış = l.time;
        });
        return Object.values(daily).reverse();
    }

    function renderAdmin(data) {
        const body = document.getElementById('logTableBody');
        const live = document.getElementById('live-status');
        const today = new Date().toLocaleDateString('tr-TR');
        body.innerHTML = "";
        live.innerHTML = "<b>Anlık Durum:</b><br>";
        
        let inWork = 0, inBreak = 0;

        data.forEach(r => {
            const isToday = r.Tarih === today;
            // OTOMATİK VARDİYA MANTIĞI: 12:00 altı 09:30, üstü 13:00
            const threshold = (r.Giriş !== "-" && r.Giriş < "12:00") ? "09:30" : "13:00";
            const isLate = r.Giriş !== "-" && r.Giriş > threshold;
            
            if(isToday && r.Giriş !== "-" && r.Çıkış === "-") {
                const onBreak = r.M_Bas !== "-" && r.M_Bit === "-";
                if(onBreak) inBreak++; else inWork++;
                live.innerHTML += `<div class="status-item"><span class="dot ${onBreak ? 'dot-break' : 'dot-work'}"></span>${r.İsim}</div>`;
            }
            body.innerHTML += `<tr><td>${r.Tarih}</td><td>${r.İsim}</td><td class="${isLate ? 'late' : ''}">${r.Giriş}</td><td>${r.M_Bas}</td><td>${r.M_Bit}</td><td>${r.Çıkış}</td></tr>`;
        });
        document.getElementById('count-work').innerText = inWork;
        document.getElementById('count-break').innerText = inBreak;
    }

    function calculatePerformance(data) {
        const scores = {};
        data.forEach(r => {
            if(!scores[r.İsim]) scores[r.İsim] = 100;
            const threshold = (r.Giriş !== "-" && r.Giriş < "12:00") ? "09:30" : "13:00";
            if(r.Giriş !== "-" && r.Giriş > threshold) scores[r.İsim] -= 10;
            if(r.M_Bas !== "-" && r.M_Bit !== "-") {
                const [h1, m1] = r.M_Bas.split(":").map(Number);
                const [h2, m2] = r.M_Bit.split(":").map(Number);
                if(((h2*60)+m2) - ((h1*60)+m1) > 45) scores[r.İsim] -= 5;
            }
        });
        let best = { name: "-", score: -1000 };
        for (let name in scores) { if(scores[name] > best.score) best = { name: name, score: scores[name] }; }
        document.getElementById('bestStaff').innerText = best.name;
    }

    function loadUserShift() {
        db.ref('logs').orderByChild('user').equalTo(currentUser).limitToLast(5).once('value', snap => {
            let lastIn = "09:30";
            snap.forEach(l => { if(l.val().type === 'İşe Giriş') lastIn = l.val().time; });
            const pref = lastIn < "12:00" ? "09:30" : "13:00";
            document.getElementById('userShift').innerText = pref;
        });
    }

    function exportExcel() {
        const excelData = window.fData.map(r => {
            let molaSuresi = 0;
            if(r.M_Bas !== "-" && r.M_Bit !== "-") {
                const [h1, m1] = r.M_Bas.split(":").map(Number);
                const [h2, m2] = r.M_Bit.split(":").map(Number);
                molaSuresi = ((h2 * 60) + m2) - ((h1 * 60) + m1);
            }
            return {
                "Tarih": r.Tarih,
                "İsim": r.İsim,
                "İşe Giriş": r.Giriş,
                "Mola Başlangıç": r.M_Bas,
                "Mola Bitiş": r.M_Bit,
                "Toplam Mola (Dk)": molaSuresi > 0 ? molaSuresi : "0",
                "İşten Çıkış": r.Çıkış
            };
        });

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Personel Raporu");
        XLSX.writeFile(wb, "IklimLife_Mola_Raporu.xlsx");
    }

    function saveShift() {} 
    function loadShiftSetting() {}
    function clearLogs() { if(confirm("Tüm kayıtlar silinsin mi?")) db.ref('logs').set(null); }
    function secureLogout() { currentUser=null; document.getElementById('pinCode').value=""; showView('staff'); }
    function cancelAction() { scanner.stop().then(() => showView('staff')); }
</script>
</body>
</html>
