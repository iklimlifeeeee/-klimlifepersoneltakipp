<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İklim Life | Takip Premium v6.6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --success: #10b981; --danger: #ef4444; --info: #3b82f6; --bg-gray: #f1f5f9; --dark-card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; color: var(--primary); transition: 0.3s; }
        .app-container { width: 100%; max-width: 440px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        
        .nav-header { display: flex; background: var(--primary); padding: 18px; gap: 10px; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: rgba(255,255,255,0.05); color: #94a3b8; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: var(--primary); transform: translateY(-2px); }

        .content { padding: 20px; flex: 1; position: relative; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none !important; }

        .premium-card { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 18px; border-radius: 15px; margin-bottom: 15px; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .mola-timer { font-size: 2.5rem; font-weight: 800; color: var(--accent); text-align: center; margin: 5px 0; font-family: monospace; }
        .progress-bg { width: 100%; background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }

        .announcement-bar { background: #fffbeb; border: 1px solid #fef3c7; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.85rem; color: #92400e; display: flex; align-items: center; gap: 8px; }

        .stat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8fafc; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-box b { display: block; font-size: 1.4rem; color: var(--accent); }

        .live-status-list { background: #f1f5f9; padding: 12px; border-radius: 15px; margin-bottom: 20px; font-size: 0.8rem; }
        .status-item { display: inline-flex; align-items: center; background: white; padding: 6px 12px; border-radius: 20px; margin: 4px; border: 1px solid #e2e8f0; font-weight: 600; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-work { background: var(--info); box-shadow: 0 0 8px var(--info); }
        .dot-break { background: var(--success); box-shadow: 0 0 8px var(--success); }

        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; margin-bottom: 15px; text-align: center; box-sizing: border-box; outline: none; }
        .btn-act { padding: 18px 10px; border-radius: 15px; border: none; color: white; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; width: 100%; }
        .bg-work { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .bg-break { background: linear-gradient(135deg, #10b981, #059669); }
        .bg-off { background: var(--primary); }
        .bg-mola-off { background: linear-gradient(135deg, #f59e0b, #d97706); }

        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; border-radius: 12px; overflow: hidden; }
        th { background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; font-weight: 800; }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; background: white; }
        .late { color: var(--danger); font-weight: 800; background: #fef2f2; }
        
        #reader { border-radius: 20px; overflow: hidden; border: 4px solid var(--accent); }
        #done { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 1000; display: none; background: white; border-radius: 50%; padding: 25px; box-shadow: 0 0 50px rgba(0,0,0,0.3); font-size: 3rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="done">✅</div>
    
    <div class="nav-header">
        <button id="t-staff" class="nav-btn active" onclick="showView('staff')">PERSONEL</button>
        <button id="t-admin" class="nav-btn" onclick="showView('admin')">YÖNETİCİ</button>
    </div>

    <div class="content">
        <div id="announcement-view" class="announcement-bar hidden">
            <span>📢</span> <marquee id="announcement-text" behavior="scroll" direction="left">Hoş geldiniz!</marquee>
        </div>

        <div id="view-login">
            <h2 style="text-align:center">İklim Life</h2>
            <input type="password" id="pinCode" placeholder="PIN" maxlength="4" style="letter-spacing:15px; font-size:2rem;">
            <button class="btn-act bg-off" onclick="processLogin()">Giriş Yap</button>
        </div>

        <div id="view-panel" class="hidden">
            <div id="mola-active-card" class="premium-card hidden" style="border: 2px solid var(--success);">
                <small>☕ CANLI MOLA TAKİBİ</small>
                <div class="mola-timer" id="live-timer">00:00</div>
                <div class="progress-bg"><div id="p-bar" class="progress-fill"></div></div>
                <div style="text-align:center; font-size:0.75rem; font-weight:700;">Kalan: <span id="mola-left">45 dk</span></div>
            </div>

            <div id="winner-card" class="premium-card hidden" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                <small>🏆 HAFTANIN PERSONELİ</small>
                <h3 id="winner-name" style="margin:5px 0;">-</h3>
                <div style="font-size:0.7rem;">En yüksek performans ve dakiklik!</div>
            </div>

            <div class="premium-card">
                <small id="shiftLabel">Bugünkü Vardiyanız</small>
                <h4 id="userShift">Yükleniyor...</h4>
                <div id="shiftStatus" style="font-size:0.75rem;">Sabah: 10:30 | Öğle: 13:00</div>
            </div>
            
            <h3 id="userName" style="text-align:center; margin-bottom:20px;"></h3>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn-act bg-work" onclick="triggerQR('İşe Giriş')">🚀 İşe Başla</button>
                <button class="btn-act bg-off" onclick="triggerQR('İşten Çıkış')">🏠 Mesai Bitir</button>
                <button class="btn-act bg-break" onclick="triggerQR('Mola Başlat')">☕ Mola Başlat</button>
                <button class="btn-act bg-mola-off" onclick="triggerQR('Mola Bitir')">✅ Mola Bitir</button>
            </div>
            <button style="width:100%; margin-top:20px; border:none; color:#94a3b8; background:none;" onclick="secureLogout()">Güvenli Çıkış</button>
        </div>

        <div id="view-admin" class="hidden">
            <div id="admin-gate">
                <input type="password" id="adminKey" placeholder="Yönetici Şifresi">
                <button class="btn-act bg-off" onclick="unlockAdmin()">Paneli Aç</button>
            </div>
            <div id="admin-data" class="hidden">
                <div class="stat-box" style="margin-bottom:15px; padding:10px;">
                    <input type="text" id="adminMsg" placeholder="Yeni duyuru yazın..." style="margin-bottom:10px; padding:10px; font-size:0.8rem;">
                    <button class="btn-act bg-work" style="padding:10px; font-size:0.8rem;" onclick="publishAnnouncement()">📢 Duyuruyu Yayınla</button>
                </div>

                <div class="stat-container">
                    <div class="stat-box"><b id="count-work">0</b><span>İçeride</span></div>
                    <div class="stat-box"><b id="count-break">0</b><span>Molada</span></div>
                </div>
                <div id="live-status" class="live-status-list">Anlık Durum: </div>
                
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <button class="btn-act bg-break" style="padding:12px;" onclick="exportExcel()">📊 Excel Raporu</button>
                    <button class="btn-act bg-off" style="padding:12px;" onclick="clearLogs()">🧹 Sıfırla</button>
                </div>

                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Tarih</th><th>İsim</th><th>Giriş</th><th>Mola Baş</th><th>Mola Bit</th><th>Çıkış</th></tr></thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-qr" class="hidden">
            <div id="reader"></div>
            <button class="btn-act bg-off" style="margin-top:15px;" onclick="cancelAction()">Vazgeç</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCpgQk-EhcjrsTv685nWM_FlpTFIQBHL5Q",
      authDomain: "iklimlifetakip-c7461.firebaseapp.com",
      projectId: "iklimlifetakip-c7461",
      storageBucket: "iklimlifetakip-c7461.firebasestorage.app",
      messagingSenderId: "657885458698",
      appId: "1:657885458698:web:7fe357879bc2f527c1caf3",
      databaseURL: "https://iklimlifetakip-c7461-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const scanner = new Html5Qrcode("reader");

    const STORE = {
        CODE: "MAGAZA-12345",
        PASS: "1674",
        STAFF: { "0600":"Kübra","6173":"Nefise","7349":"Burcu","9506":"Sultan","4672":"Derya","8672":"Yasemin","1510":"Eda","4209":"Özgün"}
    };

    let currentUser = null;
    let timerInterval = null;

    function checkLocation(callback) {
        if (!navigator.geolocation) { alert("Konum gerekli."); return; }
        navigator.geolocation.getCurrentPosition(() => { callback(); }, () => { alert("Konum izni verin!"); });
    }

    function showView(v) {
        ['view-login','view-panel','view-qr','view-admin'].forEach(id => document.getElementById(id).classList.add('hidden'));
        if(v==='staff') {
            if(currentUser) { 
                document.getElementById('view-panel').classList.remove('hidden');
                document.getElementById('announcement-view').classList.remove('hidden');
                loadUserShift();
                checkActiveMola();
                calculatePerformance(); 
            } else { document.getElementById('view-login').classList.remove('hidden'); }
        } else { document.getElementById('view-admin').classList.remove('hidden'); }
        document.getElementById('t-staff').classList.toggle('active', v==='staff');
        document.getElementById('t-admin').classList.toggle('active', v==='admin');
    }

    function processLogin() {
        const pin = document.getElementById('pinCode').value;
        if(STORE.STAFF[pin]) { 
            currentUser = STORE.STAFF[pin]; 
            document.getElementById('userName').innerText = `Hoş Geldin, ${currentUser}`; 
            showView('staff');
            listenAnnouncements();
        } else alert("PIN Hatalı!");
    }

    function checkActiveMola() {
        const today = new Date().toLocaleDateString('tr-TR');
        db.ref('logs').orderByChild('user').equalTo(currentUser).limitToLast(5).once('value', snap => {
            let lastStart = null; let isRunning = false;
            snap.forEach(l => {
                if(l.val().date === today) {
                    if(l.val().type === 'Mola Başlat') { lastStart = l.val().ts; isRunning = true; }
                    if(l.val().type === 'Mola Bitir') { isRunning = false; }
                }
            });
            if(isRunning && lastStart) {
                document.getElementById('mola-active-card').classList.remove('hidden');
                startLiveTimer(lastStart);
            } else {
                document.getElementById('mola-active-card').classList.add('hidden');
                clearInterval(timerInterval);
            }
        });
    }

    function startLiveTimer(startTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('live-timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            const progress = (mins / 45) * 100;
            document.getElementById('p-bar').style.width = Math.min(progress, 100) + "%";
            document.getElementById('p-bar').style.background = progress > 100 ? "var(--danger)" : "var(--success)";
            const left = 45 - mins;
            document.getElementById('mola-left').innerText = left > 0 ? left + " dk kaldı" : "Süre Doldu!";
        }, 1000);
    }

    function triggerQR(type) {
        checkLocation(() => {
            document.getElementById('view-panel').classList.add('hidden');
            document.getElementById('view-qr').classList.remove('hidden');
            scanner.start({facingMode:"environment"}, {fps:15, qrbox:250}, res => {
                if(res === STORE.CODE) {
                    scanner.stop().then(() => {
                        const d = new Date();
                        const time = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                        db.ref('logs').push({ 
                            date: d.toLocaleDateString('tr-TR'), 
                            user: currentUser, 
                            type: type, 
                            time: time, 
                            ts: Date.now() 
                        }).then(() => {
                            document.getElementById('done').style.display='block';
                            setTimeout(() => { 
                                document.getElementById('done').style.display='none'; 
                                checkActiveMola();
                                showView('staff');
                            }, 1200);
                        });
                    });
                }
            });
        });
    }

    function unlockAdmin() {
        if(document.getElementById('adminKey').value === STORE.PASS) {
            document.getElementById('admin-gate').classList.add('hidden');
            document.getElementById('admin-data').classList.remove('hidden');
            db.ref('logs').on('value', snap => {
                const logs = []; snap.forEach(c => logs.push(c.val()));
                const report = processReport(logs);
                window.fData = report;
                renderAdmin(report);
            });
        }
    }

    function processReport(logs) {
        const daily = {};
        logs.forEach(l => {
            const id = `${l.date}_${l.user}`;
            if(!daily[id]) daily[id] = { Tarih: l.date, İsim: l.user, Giriş: "-", M_Bas: "-", M_Bit: "-", Çıkış: "-" };
            if(l.type === 'İşe Giriş') daily[id].Giriş = l.time;
            if(l.type === 'Mola Başlat') daily[id].M_Bas = l.time;
            if(l.type === 'Mola Bitir') daily[id].M_Bit = l.time;
            if(l.type === 'İşten Çıkış') daily[id].Çıkış = l.time;
        });
        return Object.values(daily).reverse();
    }

    function renderAdmin(data) {
        const body = document.getElementById('logTableBody');
        const live = document.getElementById('live-status');
        const today = new Date().toLocaleDateString('tr-TR');
        body.innerHTML = ""; live.innerHTML = "<b>Anlık Durum:</b><br>";
        let inWork = 0, inBreak = 0;

        data.forEach(r => {
            const isToday = r.Tarih === today;
            const threshold = (r.Giriş !== "-" && r.Giriş < "12:00") ? "10:30" : "13:00";
            const isLate = r.Giriş !== "-" && r.Giriş > threshold;
            
            // ANLIK DURUM MANTIĞI GÜNCELLENDİ
            if(isToday && r.Giriş !== "-" && r.Çıkış === "-") {
                const onBreak = r.M_Bas !== "-" && r.M_Bit === "-";
                if(onBreak) inBreak++; else inWork++;
                live.innerHTML += `<div class="status-item"><span class="dot ${onBreak ? 'dot-break' : 'dot-work'}"></span>${r.İsim} ${onBreak ? '(Molada)' : ''}</div>`;
            }
            body.innerHTML += `<tr><td>${r.Tarih}</td><td>${r.İsim}</td><td class="${isLate ? 'late' : ''}">${r.Giriş}</td><td>${r.M_Bas}</td><td>${r.M_Bit}</td><td>${r.Çıkış}</td></tr>`;
        });
        document.getElementById('count-work').innerText = inWork;
        document.getElementById('count-break').innerText = inBreak;
    }

    function exportExcel() {
        const excelData = window.fData.map(r => {
            let molaSuresi = 0;
            if(r.M_Bas !== "-" && r.M_Bit !== "-") {
                const [h1, m1] = r.M_Bas.split(":").map(Number);
                const [h2, m2] = r.M_Bit.split(":").map(Number);
                molaSuresi = ((h2 * 60) + m2) - ((h1 * 60) + m1);
            }
            return {
                "Tarih": r.Tarih, "İsim": r.İsim,
                "İşe Giriş": r.Giriş, "Mola Başlangıç": r.M_Bas,
                "Mola Bitiş": r.M_Bit, "Toplam Mola (Dk)": molaSuresi > 0 ? molaSuresi : "0",
                "İşten Çıkış": r.Çıkış
            };
        });
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rapor");
        XLSX.writeFile(wb, "IklimLife_Rapor.xlsx");
    }

    function loadUserShift() {
        db.ref('logs').orderByChild('user').equalTo(currentUser).limitToLast(5).once('value', snap => {
            let lastIn = "10:30";
            snap.forEach(l => { if(l.val().type === 'İşe Giriş') lastIn = l.val().time; });
            document.getElementById('userShift').innerText = lastIn < "12:00" ? "10:30" : "13:00";
        });
    }

    function publishAnnouncement() {
        const msg = document.getElementById('adminMsg').value;
        if(msg) {
            db.ref('announcement').set({ text: msg }).then(() => {
                alert("Duyuru yayınlandı!");
                document.getElementById('adminMsg').value = "";
            });
        }
    }

    function listenAnnouncements() { 
        db.ref('announcement').on('value', snap => { 
            if(snap.exists()) {
                document.getElementById('announcement-view').classList.remove('hidden');
                document.getElementById('announcement-text').innerText = snap.val().text; 
            }
        }); 
    }

    function calculatePerformance() {
        db.ref('logs').limitToLast(100).once('value', snap => {
            const scores = {};
            snap.forEach(l => {
                const log = l.val();
                if(log.type === 'İşe Giriş') {
                    if(!scores[log.user]) scores[log.user] = 0;
                    const threshold = log.time < "12:00" ? "10:35" : "13:05";
                    if(log.time <= threshold) scores[log.user] += 10;
                }
            });
            let winner = "-"; let max = -1;
            for(let p in scores) { if(scores[p] > max) { max = scores[p]; winner = p; } }
            if(winner !== "-") {
                document.getElementById('winner-card').classList.remove('hidden');
                document.getElementById('winner-name').innerText = winner;
            }
        });
    }

    function secureLogout() { currentUser=null; clearInterval(timerInterval); document.getElementById('pinCode').value=""; showView('staff'); }
    function cancelAction() { scanner.stop().then(() => showView('staff')); }
    function clearLogs() { if(confirm("Tüm kayıtlar silinsin mi?")) db.ref('logs').set(null); }
    function saveShift() {} function loadShiftSetting() {}
</script>
</body>
</html>
